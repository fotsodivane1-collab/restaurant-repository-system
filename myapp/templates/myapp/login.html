{% load i18n %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% trans "Login" %}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Montserrat", sans-serif;
        background: #1a1a1a;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-box {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
      }
      h2 {
        text-align: center;
        margin-bottom: 24px;
        font-size: 20px;
        letter-spacing: 2px;
        color: #c9a84c;
      }
      .form-group {
        margin-bottom: 16px;
      }
      label {
        font-size: 12px;
        letter-spacing: 1px;
        color: #aaa;
      }
      input {
        width: 100%;
        padding: 10px 14px;
        margin-top: 6px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
      }
      .btn {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #8b1a1a;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 2px;
        cursor: pointer;
        transition: background 0.3s;
      }
      .btn:hover {
        background: #a52020;
      }
      .links {
        margin-top: 20px;
        text-align: center;
        font-size: 12px;
        color: #aaa;
      }
      .links a {
        color: #c9a84c;
        text-decoration: none;
        margin: 0 8px;
      }
      .links a:hover {
        text-decoration: underline;
      }
      .errors {
        color: #ff6b6b;
        font-size: 12px;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>{% trans "LOGIN" %}</h2>
      <form method="POST">
        {% csrf_token %} {% for field in form %}
        <div class="form-group">
          <label>{{ field.label }}</label>
          {{ field }} {% if field.errors %}
          <div class="errors">{{ field.errors }}</div>
          {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn">{% trans "SIGN IN" %}</button>
      </form>
      <div class="links">
        <a href="{% url 'myapp:reserve' %}">{% trans "Reserve a table" %}</a> |
        <a href="{% url 'myapp:home' %}">{% trans "Back to Home" %}</a> |
        <a href="{% url 'myapp:register' %}">{% trans "Register" %}</a>
      </div>
    </div>
  </body>
</html>
